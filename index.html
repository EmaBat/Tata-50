    function razcleniCSV(vhod) {
      const vrstice = [];
      let vrstica = [];
      let polje = "";
      let vNarekovajih = false;

      for (let i = 0; i < vhod.length; i++) {
        const znak = vhod[i];
        const naslednji = vhod[i + 1];

        if (znak === '"') {
          if (vNarekovajih && naslednji === '"') {
            polje += '"';
            i++;
          } else {
            vNarekovajih = !vNarekovajih;
          }
        } else if (znak === ',' && !vNarekovajih) {
          vrstica.push(polje);
          polje = "";
        } else if ((znak === '\n' || znak === '\r') && !vNarekovajih) {
          if (znak === '\r' && naslednji === '\n') i++;
          vrstica.push(polje);
          if (vrstica.some(celica => celica.trim() !== "")) vrstice.push(vrstica);
          vrstica = [];
          polje = "";
        } else {
          polje += znak;
        }
      }

      vrstica.push(polje);
      if (vrstica.some(celica => celica.trim() !== "")) vrstice.push(vrstica);
      return vrstice;
    }

    function pripraviSporocila(csv) {
      const vrstice = razcleniCSV(csv);
      const glava = vrstice[0].map(x => x.trim().toLowerCase());

      const indeksIme = glava.findIndex(x => x === "ime priimek");
      const indeksSporocilo = glava.findIndex(x => x.includes("sporočilo slavljencu"));

      return vrstice.slice(1)
        .map((vrstica, indeks) => ({
          id: indeks,
          ime: (vrstica[indeksIme] || "Gost").trim() || "Gost",
          tekst: (vrstica[indeksSporocilo] || "").trim()
        }))
        .filter(vnos => vnos.tekst.length > 0);
    }

    const sporocila = pripraviSporocila(csvBesedilo);

    // Vrstni red sporočil: ko se sporočilo pokaže, gre na konec vrste.
    // Program izbira samo med prvimi 25, zato se isto sporočilo ne ponavlja hitro.
    let vrstaSporocil = [...sporocila];

    function premesaj(seznam) {
      for (let i = seznam.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [seznam[i], seznam[j]] = [seznam[j], seznam[i]];
      }
      return seznam;
    }

    premesaj(vrstaSporocil);
    const zaslon = document.getElementById("zaslon");
    const aktivni = [];

    const NAJ_VEC_ELEMENTOV = 8;
    const VSAJ_SPOROCIL = 2;
    const INTERVAL_NOVEGA_ELEMENTA = 3200;
    const CAS_RASTI = 4500;
    const CAS_LEBDENJA = 26000;
    const CAS_IZGINJANJA = 3500;
    const RAZMAK = 20;
    const NAJVEC_SPOROCIL = 3;
    const NAJVEC_SLIK = 5;
    const MIN_CAS_NA_ZASLONU = 10000;
    const MAX_CAS_NA_ZASLONU = 60000;

    function nakljucno(min, max) {
      return Math.random() * (max - min) + min;
    }

    function steviloSporocilNaZaslonu() {
      return aktivni.filter(e => e.tip === "sporocilo" && !e.odstranjujem).length;
    }

    function steviloSlikNaZaslonu() {
      return aktivni.filter(e => e.tip === "slika" && !e.odstranjujem).length;
    }

    function aktivniIDjiSporocil() {
      return new Set(
        aktivni
          .filter(e => e.tip === "sporocilo" && !e.odstranjujem)
          .map(e => e.sporociloId)
      );
    }

    function izberiSporociloKiNiNaZaslonu() {
      const uporabljeni = aktivniIDjiSporocil();

      // Izbiramo samo med prvimi 25 sporočili v vrsti.
      // Če je sporočil manj kot 25, izbiramo med vsemi.
      const velikostIzbire = Math.min(25, vrstaSporocil.length);

      let kandidati = vrstaSporocil
        .slice(0, velikostIzbire)
        .filter(s => !uporabljeni.has(s.id));

      // Če so vsa prva sporočila že na zaslonu, pogledamo malo širše,
      // vendar še vedno ne dovolimo, da je isto sporočilo hkrati 2x na zaslonu.
      if (kandidati.length === 0) {
        kandidati = vrstaSporocil.filter(s => !uporabljeni.has(s.id));
      }

      if (kandidati.length === 0) return null;

      const izbrano = kandidati[Math.floor(Math.random() * kandidati.length)];

      // Izbrano sporočilo premaknemo na konec vrste.
      const indeks = vrstaSporocil.findIndex(s => s.id === izbrano.id);
      if (indeks !== -1) {
        vrstaSporocil.splice(indeks, 1);
        vrstaSporocil.push(izbrano);
      }

      return izbrano;
    }

    function izberiNakljucno(seznam) {
      return seznam[Math.floor(Math.random() * seznam.length)];
    }

    function escapeHTML(besedilo) {
      return besedilo
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function skrajsajPredolgoBesedilo(tekst) {
      const najvec = 780;
      if (tekst.length <= najvec) return tekst;
      return tekst.slice(0, najvec).trim() + " …";
    }

    function prilagodiVelikost(element, tekst) {
      if (tekst.length > 900) {
        element.style.fontSize = "16px";
        element.style.maxWidth = "540px";
      } else if (tekst.length > 550) {
        element.style.fontSize = "18px";
        element.style.maxWidth = "520px";
      } else if (tekst.length > 300) {
        element.style.fontSize = "20px";
        element.style.maxWidth = "490px";
      }
    }

    function ustvariSporocilo() {
      const podatek = izberiSporociloKiNiNaZaslonu();
      if (!podatek) return null;
      const element = document.createElement("div");
      element.className = "element sporocilo";
      prilagodiVelikost(element, podatek.tekst);

      const varnoSporocilo = escapeHTML(skrajsajPredolgoBesedilo(podatek.tekst));
      const varnoIme = escapeHTML(podatek.ime);

      element.innerHTML = `
        <div>${varnoSporocilo}</div>
        <div class="ime">— ${varnoIme}</div>
      `;

      zaslon.appendChild(element);
      return { element, tip: "sporocilo", sporociloId: podatek.id };
    }

    function ustvariSliko() {
      const element = document.createElement("img");
      element.className = "element slika";
      element.src = izberiNakljucno(slike);

      const velikost = nakljucno(190, 340);
      element.style.width = velikost + "px";
      element.style.height = velikost + "px";

      zaslon.appendChild(element);
      return { element, tip: "slika" };
    }

    function sePrekriva(a, b) {
      // Strogo preverjanje okvirjev: tudi kotički se ne smejo dotikati/prekrivati.
      return !(
        a.x + a.w + RAZMAK <= b.x ||
        a.x >= b.x + b.w + RAZMAK ||
        a.y + a.h + RAZMAK <= b.y ||
        a.y >= b.y + b.h + RAZMAK
      );
    }

    function najdiProstoMesto(w, h) {
      for (let i = 0; i < 220; i++) {
        const kandidat = {
          x: nakljucno(30, Math.max(30, window.innerWidth - w - 30)),
          y: nakljucno(30, Math.max(30, window.innerHeight - h - 30)),
          w, h
        };

        let prosto = true;
        for (const drug of aktivni) {
          if (!drug.odstranjujem && sePrekriva(kandidat, drug)) {
            prosto = false;
            break;
          }
        }

        if (prosto) return kandidat;
      }

      return null;
    }

    function dodajElement(prisilnoSporocilo = false) {
      if (aktivni.length >= NAJ_VEC_ELEMENTOV) return;
      if (sporocila.length === 0 && slike.length === 0) return;

      const stSporocil = steviloSporocilNaZaslonu();
      const stSlik = steviloSlikNaZaslonu();

      // Na zaslonu naj bosta 2 ali 3 sporočila.
      // Če sta že 3, ne dodajamo novega sporočila.
      // Če je slik že 5, ne dodajamo nove slike.
      let najBoSporocilo;

      if (prisilnoSporocilo || stSporocil < VSAJ_SPOROCIL) {
        najBoSporocilo = true;
      } else if (stSporocil >= NAJVEC_SPOROCIL) {
        najBoSporocilo = false;
      } else if (stSlik >= NAJVEC_SLIK) {
        najBoSporocilo = true;
      } else {
        najBoSporocilo = Math.random() < 0.45;
      }

      if (najBoSporocilo && stSporocil >= NAJVEC_SPOROCIL) return;
      if (!najBoSporocilo && stSlik >= NAJVEC_SLIK) return;

      const nov = najBoSporocilo ? ustvariSporocilo() : ustvariSliko();
      if (!nov) return;

      setTimeout(() => {
        if (!document.body.contains(nov.element)) return;

        const w = nov.element.offsetWidth || 280;
        const h = nov.element.offsetHeight || 220;
        const mesto = najdiProstoMesto(w, h);

        // Če ni prostora, se element ne pojavi.
        if (!mesto) {
          nov.element.remove();
          return;
        }

        const trajanje = nakljucno(MIN_CAS_NA_ZASLONU, MAX_CAS_NA_ZASLONU);
        const casLebdenja = Math.max(1000, trajanje - CAS_RASTI - CAS_IZGINJANJA);

        const zapis = {
          ...nov,
          x: mesto.x,
          y: mesto.y,
          w,
          h,
          vx: nakljucno(-0.16, 0.16),
          vy: nakljucno(-0.16, 0.16),
          scale: 0.08,
          opacity: 0,
          rot: nakljucno(-7, 7),
          rojstvo: performance.now(),
          casRasti: CAS_RASTI,
          casLebdenja,
          casIzginjanja: CAS_IZGINJANJA,
          odstranjujem: false
        };

        aktivni.push(zapis);
      }, 100);
    }

    function posodobi() {
      const zdaj = performance.now();

      for (let i = aktivni.length - 1; i >= 0; i--) {
        const a = aktivni[i];
        const starost = zdaj - a.rojstvo;
        const zacetekIzginjanja = a.casRasti + a.casLebdenja;
        const konec = a.casRasti + a.casLebdenja + a.casIzginjanja;

        if (starost < a.casRasti) {
          const p = starost / a.casRasti;
          a.scale = 0.08 + 0.92 * p;
          a.opacity = p;
        } else if (starost < zacetekIzginjanja) {
          a.scale = 1;
          a.opacity = 1;
        } else if (starost < konec) {
          const p = (starost - zacetekIzginjanja) / a.casIzginjanja;
          a.scale = 1 - 0.25 * p;
          a.opacity = 1 - p;
          a.odstranjujem = true;
        } else {
          a.element.remove();
          aktivni.splice(i, 1);
          continue;
        }

        if (!a.odstranjujem) {
          a.vx += nakljucno(-0.006, 0.006);
          a.vy += nakljucno(-0.006, 0.006);
        }
      }

      for (let i = 0; i < aktivni.length; i++) {
        for (let j = i + 1; j < aktivni.length; j++) {
          const a = aktivni[i];
          const b = aktivni[j];
          if (a.odstranjujem || b.odstranjujem) continue;

          const ax = a.x + a.w / 2;
          const ay = a.y + a.h / 2;
          const bx = b.x + b.w / 2;
          const by = b.y + b.h / 2;
          const dx = ax - bx;
          const dy = ay - by;
          const razdalja = Math.sqrt(dx * dx + dy * dy) || 1;
          const prekrivanjeOkvirjev = sePrekriva(a, b);
          const minRazdalja = Math.max(a.w, a.h, b.w, b.h) * 0.72 + RAZMAK;

          if (prekrivanjeOkvirjev || razdalja < minRazdalja) {
            const moc = prekrivanjeOkvirjev ? 0.12 : (minRazdalja - razdalja) / minRazdalja * 0.045;
            const nx = dx / razdalja;
            const ny = dy / razdalja;
            a.vx += nx * moc;
            a.vy += ny * moc;
            b.vx -= nx * moc;
            b.vy -= ny * moc;

            // Če sta se okvirja vseeno preveč približala, ju nežno fizično razmaknemo.
            if (prekrivanjeOkvirjev) {
              a.x += nx * 0.7;
              a.y += ny * 0.7;
              b.x -= nx * 0.7;
              b.y -= ny * 0.7;
            }
          }
        }
      }

      for (const a of aktivni) {
        if (!a.odstranjujem) {
          const hitrost = Math.sqrt(a.vx * a.vx + a.vy * a.vy);
          const maxHitrost = 0.32;

          if (hitrost > maxHitrost) {
            a.vx = a.vx / hitrost * maxHitrost;
            a.vy = a.vy / hitrost * maxHitrost;
          }

          a.x += a.vx;
          a.y += a.vy;

          if (a.x < 20 || a.x + a.w > window.innerWidth - 20) {
            a.vx *= -1;
            a.x = Math.max(20, Math.min(window.innerWidth - a.w - 20, a.x));
          }

          if (a.y < 20 || a.y + a.h > window.innerHeight - 20) {
            a.vy *= -1;
            a.y = Math.max(20, Math.min(window.innerHeight - a.h - 20, a.y));
          }
        }

        a.element.style.opacity = a.opacity;
        a.element.style.transform = `translate(${a.x}px, ${a.y}px) scale(${a.scale}) rotate(${a.rot}deg)`;
      }

      if (steviloSporocilNaZaslonu() < VSAJ_SPOROCIL) {
        dodajElement(true);
      }

      requestAnimationFrame(posodobi);
    }

    setInterval(() => dodajElement(false), INTERVAL_NOVEGA_ELEMENTA);

    dodajElement(true);
    setTimeout(() => dodajElement(true), 900);
    setTimeout(() => dodajElement(false), 2600);
    setTimeout(() => dodajElement(false), 5200);

    requestAnimationFrame(posodobi);
