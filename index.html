<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rojstnodnevni spomini</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at center, #fff7e6 0%, #ffd6e0 45%, #b8d8ff 100%);
      font-family: Arial, Helvetica, sans-serif;
      height: 100vh;
      width: 100vw;
    }

    #zaslon {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .element {
      position: absolute;
      transform-origin: center center;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    }

    .sporocilo {
      max-width: 470px;
      min-width: 240px;
      padding: 22px 26px;
      background: rgba(255, 255, 255, 0.94);
      border-radius: 30px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.22);
      font-size: 22px;
      line-height: 1.33;
      color: #333;
      text-align: center;
      border: 3px solid rgba(255, 255, 255, 0.9);
      white-space: pre-line;
    }

    .sporocilo .ime {
      margin-top: 14px;
      font-size: 17px;
      font-weight: bold;
      color: #8a4fff;
      white-space: normal;
    }

    .slika {
      width: 300px;
      height: 300px;
      border-radius: 30px;
      object-fit: cover;
      box-shadow: 0 14px 38px rgba(0, 0, 0, 0.28);
      border: 8px solid white;
      background: white;
    }

    #napis {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 54px;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.55);
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      letter-spacing: 2px;
      z-index: 1;
      user-select: none;
      text-align: center;
    }

    #navodilo {
      position: fixed;
      left: 18px;
      bottom: 14px;
      font-size: 14px;
      color: rgba(0, 0, 0, 0.55);
      z-index: 1000;
    }
  </style>
</head>

<body>
  <div id="zaslon">
    <div id="napis">Vse najboljše!</div>
  </div>
  <div id="navodilo">Pritisni F11 za celozaslonski prikaz.</div>

  <script>
    var URL_NOVA_SPOROCILA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQh_N_N2St94RSw0sznxFiWG-Xu7dr1Mc4fXvxFkg1vEb0gWldRo1940jnKrlkF6cnnjoTdubNHGW3_/pubhtml";
    var URL_STARA_SPOROCILA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRuPWLUK4hD1us66sqCUeN7xKxhsbnrD6VY44Vd095HLQPnXX8LfuSb-MK51Dat8yCQ2bheMd6ZaYnc/pub?output=csv";

    var slike = Array.from({ length: 67 }, function(_, i) {
      return "slike/slika (" + (i + 1) + ").png";
    });

    var sporocila = [];
    var vrstaSporocil = [];

    function popraviCsvUrl(url) {
      if (url.indexOf("pubhtml") !== -1) {
        return url.replace("pubhtml", "pub?output=csv");
      }
      return url;
    }

    function razcleniCSV(vhod) {
      var vrstice = [];
      var vrstica = [];
      var polje = "";
      var vNarekovajih = false;

      for (var i = 0; i < vhod.length; i++) {
        var znak = vhod[i];
        var naslednji = vhod[i + 1];

        if (znak === '"') {
          if (vNarekovajih && naslednji === '"') {
            polje += '"';
            i++;
          } else {
            vNarekovajih = !vNarekovajih;
          }
        } else if (znak === "," && !vNarekovajih) {
          vrstica.push(polje);
          polje = "";
        } else if ((znak === "\n" || znak === "\r") && !vNarekovajih) {
          if (znak === "\r" && naslednji === "\n") i++;
          vrstica.push(polje);
          if (vrstica.some(function(c) { return c.trim() !== ""; })) vrstice.push(vrstica);
          vrstica = [];
          polje = "";
        } else {
          polje += znak;
        }
      }

      vrstica.push(polje);
      if (vrstica.some(function(c) { return c.trim() !== ""; })) vrstice.push(vrstica);
      return vrstice;
    }

    function normaliziraj(besedilo) {
      return String(besedilo || "")
        .trim()
        .toLowerCase()
        .split("č").join("c")
        .split("š").join("s")
        .split("ž").join("z")
        .split("ć").join("c")
        .split("đ").join("d")
        .replace(/[:?]/g, "");
    }

    function najdiStolpec(glava, moznosti) {
      var norm = glava.map(normaliziraj);

      for (var i = 0; i < moznosti.length; i++) {
        var iskano = normaliziraj(moznosti[i]);
        for (var j = 0; j < norm.length; j++) {
          if (norm[j].indexOf(iskano) !== -1) return j;
        }
      }

      return -1;
    }

    function pripraviStaraSporocila(csv) {
      var vrstice = razcleniCSV(csv);
      if (vrstice.length < 2) return [];

      var glava = vrstice[0];

      var indeksIme = najdiStolpec(glava, ["ime priimek"]);
      var indeksSporocilo = najdiStolpec(glava, ["sporocilo slavljencu", "sporočilo slavljencu"]);

      if (indeksIme === -1 || indeksSporocilo === -1) return [];

      return vrstice.slice(1).map(function(vrstica, indeks) {
        return {
          id: "staro-" + indeks,
          ime: ((vrstica[indeksIme] || "Gost").trim() || "Gost"),
          tekst: ((vrstica[indeksSporocilo] || "").trim())
        };
      }).filter(function(vnos) {
        return vnos.tekst.length > 0;
      });
    }

    function pripraviNovaSporocila(csv) {
      var vrstice = razcleniCSV(csv);
      if (vrstice.length < 2) return [];

      var glava = vrstice[0];

      var indeksIme = najdiStolpec(glava, ["ime in priimek", "ime priimek"]);
      var indeksSporocilo = najdiStolpec(glava, ["sporocilo", "sporočilo"]);

      if (indeksIme === -1 || indeksSporocilo === -1) return [];

      return vrstice.slice(1).map(function(vrstica, indeks) {
        return {
          id: "novo-" + indeks,
          ime: ((vrstica[indeksIme] || "Gost").trim() || "Gost"),
          tekst: ((vrstica[indeksSporocilo] || "").trim())
        };
      }).filter(function(vnos) {
        return vnos.tekst.length > 0;
      });
    }

    async function preberiCSV(url) {
      var csvUrl = popraviCsvUrl(url);
      var locilo = csvUrl.indexOf("?") === -1 ? "?" : "&";
      var odgovor = await fetch(csvUrl + locilo + "cacheBust=" + Date.now());
      return await odgovor.text();
    }

    async function osveziSporocila() {
      try {
        var csvStara = await preberiCSV(URL_STARA_SPOROCILA);
        var csvNova = await preberiCSV(URL_NOVA_SPOROCILA);

        var stara = pripraviStaraSporocila(csvStara);
        var nova = pripraviNovaSporocila(csvNova);

        var vsa = stara.concat(nova);

        var obstojeci = new Set(sporocila.map(function(s) {
          return s.id + "|" + s.ime + "|" + s.tekst;
        }));

        for (var i = 0; i < vsa.length; i++) {
          var s = vsa[i];
          var kljuc = s.id + "|" + s.ime + "|" + s.tekst;

          if (!obstojeci.has(kljuc)) {
            sporocila.push(s);

            if (s.id.indexOf("novo-") === 0) {
              vrstaSporocil.unshift(s);

              // Če sporočilo pride po začetnem nalaganju, ga damo v prednostno vrsto
              if (!prvoNalaganaje) {
                prednostnaSporocila.unshift(s);
              }
            } else {
              vrstaSporocil.push(s);
            }
          }
        }

        if (prvoNalaganaje && vrstaSporocil.length > 0) {
          premesaj(vrstaSporocil);
        }

        prvoNalaganaje = false;

        console.log("Naloženih sporočil:", sporocila.length);
      } catch (napaka) {
        console.log("Napaka pri branju Google Sheets:", napaka);
      }
    }

    function premesaj(seznam) {
      for (var i = seznam.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = seznam[i];
        seznam[i] = seznam[j];
        seznam[j] = temp;
      }
      return seznam;
    }

    var zaslon = document.getElementById("zaslon");
    var aktivni = [];

    var NAJ_VEC_ELEMENTOV = 8;
    var VSAJ_SPOROCIL = 2;
    var INTERVAL_NOVEGA_ELEMENTA = 3200;
    var CAS_RASTI = 4500;
    var CAS_IZGINJANJA = 3500;
    var RAZMAK = 20;
    var NAJVEC_SPOROCIL = 3;
    var NAJVEC_SLIK = 5;
    var MIN_CAS_NA_ZASLONU = 10000;
    var MAX_CAS_NA_ZASLONU = 60000;
    var cakalnaVrstaZadnjih = [];
    var MIN_RAZMAK_PONOVITVE = 10;
    var prednostnaSporocila = [];
  var prvoNalaganaje = true;

    function nakljucno(min, max) {
      return Math.random() * (max - min) + min;
    }

    function steviloSporocilNaZaslonu() {
      return aktivni.filter(function(e) {
        return e.tip === "sporocilo" && !e.odstranjujem;
      }).length;
    }

    function steviloSlikNaZaslonu() {
      return aktivni.filter(function(e) {
        return e.tip === "slika" && !e.odstranjujem;
      }).length;
    }

    function aktivniIDjiSporocil() {
      return new Set(
        aktivni
          .filter(function(e) {
            return e.tip === "sporocilo" && !e.odstranjujem;
          })
          .map(function(e) {
            return e.sporociloId;
          })
      );
    }

    function izberiSporociloKiNiNaZaslonu() {

      var uporabljeni = aktivniIDjiSporocil();

      while (prednostnaSporocila.length > 0) {
        var nujno = prednostnaSporocila.shift();

        if (!uporabljeni.has(nujno.id)) {
          return nujno;
        }
      }
      if (vrstaSporocil.length === 0) return null;



      var kandidati = vrstaSporocil.filter(function(s) {
        return !uporabljeni.has(s.id) &&
              cakalnaVrstaZadnjih.indexOf("sporocilo|" + s.id) === -1;
      });

      if (kandidati.length === 0) {
        kandidati = vrstaSporocil.filter(function(s) {
          return !uporabljeni.has(s.id);
        });
      }

      if (kandidati.length === 0) return null;

      var izbrano = kandidati[Math.floor(Math.random() * kandidati.length)];

      var indeks = vrstaSporocil.findIndex(function(s) {
        return s.id === izbrano.id;
      });

      if (indeks !== -1) {
        vrstaSporocil.splice(indeks, 1);
        vrstaSporocil.push(izbrano);
      }

      return izbrano;
    }

    function izberiNakljucno(seznam) {
      return seznam[Math.floor(Math.random() * seznam.length)];
    }

    function escapeHTML(besedilo) {
      return String(besedilo || "")
        .split("&").join("&amp;")
        .split("<").join("&lt;")
        .split(">").join("&gt;")
        .split('"').join("&quot;")
        .split("'").join("&#039;");
    }

    function skrajsajPredolgoBesedilo(tekst) {
      var najvec = 780;
      if (tekst.length <= najvec) return tekst;
      return tekst.slice(0, najvec).trim() + " …";
    }

    function prilagodiVelikost(element, tekst) {
      if (tekst.length > 900) {
        element.style.fontSize = "16px";
        element.style.maxWidth = "540px";
      } else if (tekst.length > 550) {
        element.style.fontSize = "18px";
        element.style.maxWidth = "520px";
      } else if (tekst.length > 300) {
        element.style.fontSize = "20px";
        element.style.maxWidth = "490px";
      }
    }

    function ustvariSporocilo() {
      var podatek = izberiSporociloKiNiNaZaslonu();
      if (!podatek) return null;

      var element = document.createElement("div");
      element.className = "element sporocilo";
      prilagodiVelikost(element, podatek.tekst);

      var varnoSporocilo = escapeHTML(skrajsajPredolgoBesedilo(podatek.tekst));
      var varnoIme = escapeHTML(podatek.ime);

      element.innerHTML =
        "<div>" + varnoSporocilo + "</div>" +
        "<div class='ime'>— " + varnoIme + "</div>";

      zaslon.appendChild(element);

      return {
        element: element,
        tip: "sporocilo",
        sporociloId: podatek.id
      };
    }

    function izberiSlikoKiNiPredKratkimBilaNaZaslonu() {
      var aktivneSlike = new Set(
        aktivni
          .filter(function(e) {
            return e.tip === "slika" && !e.odstranjujem;
          })
          .map(function(e) {
            return e.slikaSrc;
          })
      );

      var kandidati = slike.filter(function(src) {
        return !aktivneSlike.has(src) && cakalnaVrstaZadnjih.indexOf("slika|" + src) === -1;
      });

      if (kandidati.length === 0) {
        kandidati = slike.filter(function(src) {
          return !aktivneSlike.has(src);
        });
      }

      if (kandidati.length === 0) return null;

      return kandidati[Math.floor(Math.random() * kandidati.length)];
    }

    function ustvariSliko() {
      var src = izberiSlikoKiNiPredKratkimBilaNaZaslonu();
      if (!src) return null;

      var element = document.createElement("img");
      element.className = "element slika";
      element.src = src;

      var velikost = nakljucno(190, 340);
      element.style.width = velikost + "px";
      element.style.height = velikost + "px";

      zaslon.appendChild(element);

      return {
        element: element,
        tip: "slika",
        slikaSrc: src
      };
    }

    function sePrekriva(a, b) {
      return !(
        a.x + a.w + RAZMAK <= b.x ||
        a.x >= b.x + b.w + RAZMAK ||
        a.y + a.h + RAZMAK <= b.y ||
        a.y >= b.y + b.h + RAZMAK
      );
    }

    function najdiProstoMesto(w, h) {
      for (var i = 0; i < 220; i++) {
        var kandidat = {
          x: nakljucno(30, Math.max(30, window.innerWidth - w - 30)),
          y: nakljucno(30, Math.max(30, window.innerHeight - h - 30)),
          w: w,
          h: h
        };

        var prosto = true;

        for (var j = 0; j < aktivni.length; j++) {
          var drug = aktivni[j];
          if (!drug.odstranjujem && sePrekriva(kandidat, drug)) {
            prosto = false;
            break;
          }
        }

        if (prosto) return kandidat;
      }

      return null;
    }

    function dodajElement(prisilnoSporocilo) {
      if (aktivni.length >= NAJ_VEC_ELEMENTOV) return;
      if (sporocila.length === 0 && slike.length === 0) return;

      var stSporocil = steviloSporocilNaZaslonu();
      var stSlik = steviloSlikNaZaslonu();

      var najBoSporocilo;

      if (prisilnoSporocilo || stSporocil < VSAJ_SPOROCIL) {
        najBoSporocilo = true;
      } else if (stSporocil >= NAJVEC_SPOROCIL) {
        najBoSporocilo = false;
      } else if (stSlik >= NAJVEC_SLIK) {
        najBoSporocilo = true;
      } else {
        najBoSporocilo = Math.random() < 0.25;
      }

      if (najBoSporocilo && stSporocil >= NAJVEC_SPOROCIL) return;
      if (!najBoSporocilo && stSlik >= NAJVEC_SLIK) return;

      var nov = najBoSporocilo ? ustvariSporocilo() : ustvariSliko();
      if (!nov) return;

      setTimeout(function() {
        if (!document.body.contains(nov.element)) return;

        var w = nov.element.offsetWidth || 280;
        var h = nov.element.offsetHeight || 220;
        var mesto = najdiProstoMesto(w, h);

        if (!mesto) {
          nov.element.remove();
          return;
        }

        var trajanje = nakljucno(MIN_CAS_NA_ZASLONU, MAX_CAS_NA_ZASLONU);
        var casLebdenja = Math.max(1000, trajanje - CAS_RASTI - CAS_IZGINJANJA);

        var zapis = {
          element: nov.element,
          tip: nov.tip,
          sporociloId: nov.sporociloId,
          slikaSrc: nov.slikaSrc,
          x: mesto.x,
          y: mesto.y,
          w: w,
          h: h,
          vx: nakljucno(-0.16, 0.16),
          vy: nakljucno(-0.16, 0.16),
          scale: 0.08,
          opacity: 0,
          rot: nakljucno(-7, 7),
          rojstvo: performance.now(),
          casRasti: CAS_RASTI,
          casLebdenja: casLebdenja,
          casIzginjanja: CAS_IZGINJANJA,
          odstranjujem: false
          
        };

        aktivni.push(zapis);
      }, 100);
    }

    function posodobi() {
      var zdaj = performance.now();

      for (var i = aktivni.length - 1; i >= 0; i--) {
        var a = aktivni[i];
        var starost = zdaj - a.rojstvo;
        var zacetekIzginjanja = a.casRasti + a.casLebdenja;
        var konec = a.casRasti + a.casLebdenja + a.casIzginjanja;

        if (starost < a.casRasti) {
          var p1 = starost / a.casRasti;
          a.scale = 0.08 + 0.92 * p1;
          a.opacity = p1;
        } else if (starost < zacetekIzginjanja) {
          a.scale = 1;
          a.opacity = 1;
        } else if (starost < konec) {
          var p2 = (starost - zacetekIzginjanja) / a.casIzginjanja;
          a.scale = 1 - 0.25 * p2;
          a.opacity = 1 - p2;
          a.odstranjujem = true;
        } else {
          if (a.tip === "sporocilo" && a.sporociloId) {
            cakalnaVrstaZadnjih.push("sporocilo|" + a.sporociloId);
          }

          if (a.tip === "slika" && a.slikaSrc) {
            cakalnaVrstaZadnjih.push("slika|" + a.slikaSrc);
          }

          while (cakalnaVrstaZadnjih.length > MIN_RAZMAK_PONOVITVE) {
            cakalnaVrstaZadnjih.shift();
          }

          a.element.remove();
          aktivni.splice(i, 1);
          continue;
        }

        if (!a.odstranjujem) {
          a.vx += nakljucno(-0.006, 0.006);
          a.vy += nakljucno(-0.006, 0.006);
        }
      }

      for (var x = 0; x < aktivni.length; x++) {
        for (var y = x + 1; y < aktivni.length; y++) {
          var e1 = aktivni[x];
          var e2 = aktivni[y];

          if (e1.odstranjujem || e2.odstranjujem) continue;

          var ax = e1.x + e1.w / 2;
          var ay = e1.y + e1.h / 2;
          var bx = e2.x + e2.w / 2;
          var by = e2.y + e2.h / 2;

          var dx = ax - bx;
          var dy = ay - by;
          var razdalja = Math.sqrt(dx * dx + dy * dy) || 1;
          var prekrivanjeOkvirjev = sePrekriva(e1, e2);
          var minRazdalja = Math.max(e1.w, e1.h, e2.w, e2.h) * 0.72 + RAZMAK;

          if (prekrivanjeOkvirjev || razdalja < minRazdalja) {
            var moc = prekrivanjeOkvirjev ? 0.12 : (minRazdalja - razdalja) / minRazdalja * 0.045;
            var nx = dx / razdalja;
            var ny = dy / razdalja;

            e1.vx += nx * moc;
            e1.vy += ny * moc;
            e2.vx -= nx * moc;
            e2.vy -= ny * moc;

            if (prekrivanjeOkvirjev) {
              e1.x += nx * 0.7;
              e1.y += ny * 0.7;
              e2.x -= nx * 0.7;
              e2.y -= ny * 0.7;
            }
          }
        }
      }

      for (var k = 0; k < aktivni.length; k++) {
        var z = aktivni[k];

        if (!z.odstranjujem) {
          var hitrost = Math.sqrt(z.vx * z.vx + z.vy * z.vy);
          var maxHitrost = 0.32;

          if (hitrost > maxHitrost) {
            z.vx = z.vx / hitrost * maxHitrost;
            z.vy = z.vy / hitrost * maxHitrost;
          }

          z.x += z.vx;
          z.y += z.vy;

          if (z.x < 20 || z.x + z.w > window.innerWidth - 20) {
            z.vx *= -1;
            z.x = Math.max(20, Math.min(window.innerWidth - z.w - 20, z.x));
          }

          if (z.y < 20 || z.y + z.h > window.innerHeight - 20) {
            z.vy *= -1;
            z.y = Math.max(20, Math.min(window.innerHeight - z.h - 20, z.y));
          }
        }

        z.element.style.opacity = z.opacity;
        z.element.style.transform =
          "translate(" + z.x + "px, " + z.y + "px) scale(" + z.scale + ") rotate(" + z.rot + "deg)";
      }

      if (steviloSporocilNaZaslonu() < VSAJ_SPOROCIL && aktivni.length < NAJ_VEC_ELEMENTOV) {
        dodajElement(true);
      }

      requestAnimationFrame(posodobi);
    }

    osveziSporocila().then(function() {
      dodajElement(true);
      setTimeout(function() { dodajElement(true); }, 900);
      setTimeout(function() { dodajElement(false); }, 2600);
      setTimeout(function() { dodajElement(false); }, 5200);

      requestAnimationFrame(posodobi);
    });

    setInterval(function() {
      osveziSporocila();
    }, 3000);

    setInterval(function() {
      dodajElement(false);
    }, INTERVAL_NOVEGA_ELEMENTA);
  </script>
</body>
</html>
